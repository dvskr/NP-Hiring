<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background -->
  <rect width="400" height="400" fill="#A8D4E8"/>

  <!-- NP Character (left side) -->
  <!-- Head -->
  <circle cx="100" cy="130" r="32" fill="#FDBCB4" stroke="#1E3A5F" stroke-width="5"/>
  <!-- Hair -->
  <path d="M68 120 Q68 92 100 92 Q132 92 132 120 Q132 110 120 105 Q100 98 80 105 Q68 110 68 120Z" fill="#5B3A29" stroke="#1E3A5F" stroke-width="3"/>
  <!-- Nurse cap -->
  <rect x="78" y="88" width="44" height="16" rx="4" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="3"/>
  <line x1="100" y1="88" x2="100" y2="104" stroke="#3B82F6" stroke-width="2"/>
  <line x1="88" y1="96" x2="112" y2="96" stroke="#3B82F6" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="88" cy="128" r="3" fill="#1E3A5F"/>
  <circle cx="112" cy="128" r="3" fill="#1E3A5F"/>
  <!-- Smile -->
  <path d="M92 142 Q100 150 108 142" stroke="#1E3A5F" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Body / Scrubs -->
  <path d="M65 162 L60 280 Q60 290 70 290 L130 290 Q140 290 140 280 L135 162 Q130 155 100 155 Q70 155 65 162Z" fill="#60A5FA" stroke="#1E3A5F" stroke-width="5"/>
  <!-- V-neck -->
  <path d="M85 162 L100 185 L115 162" stroke="#1E3A5F" stroke-width="3" fill="#FFFFFF"/>

  <!-- Right arm holding megaphone -->
  <path d="M135 175 L165 165 L180 158" stroke="#1E3A5F" stroke-width="5" stroke-linecap="round" fill="none"/>
  <circle cx="168" cy="162" r="8" fill="#FDBCB4" stroke="#1E3A5F" stroke-width="3"/>

  <!-- Left arm on hip -->
  <path d="M65 175 L50 210 L60 235" stroke="#1E3A5F" stroke-width="5" stroke-linecap="round" fill="none"/>
  <circle cx="60" cy="237" r="8" fill="#FDBCB4" stroke="#1E3A5F" stroke-width="3"/>

  <!-- Stethoscope -->
  <path d="M90 165 Q80 190 85 210" stroke="#1E3A5F" stroke-width="3" stroke-linecap="round" fill="none"/>
  <circle cx="85" cy="213" r="6" fill="#94A3B8" stroke="#1E3A5F" stroke-width="2"/>

  <!-- Legs -->
  <rect x="72" y="288" width="22" height="60" rx="8" fill="#60A5FA" stroke="#1E3A5F" stroke-width="4"/>
  <rect x="106" y="288" width="22" height="60" rx="8" fill="#60A5FA" stroke="#1E3A5F" stroke-width="4"/>
  <!-- Shoes -->
  <ellipse cx="83" cy="355" rx="16" ry="9" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="4"/>
  <ellipse cx="117" cy="355" rx="16" ry="9" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="4"/>

  <!-- Megaphone -->
  <polygon points="175,140 280,90 280,210 175,178" fill="#F97316" stroke="#1E3A5F" stroke-width="5" stroke-linejoin="round"/>
  <rect x="165" y="138" width="14" height="42" rx="5" fill="#EA580C" stroke="#1E3A5F" stroke-width="4"/>
  <circle cx="280" cy="150" r="4" fill="#FBBF24"/>

  <!-- Sound waves -->
  <path d="M290 120 Q310 150 290 180" stroke="#F97316" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M305 105 Q335 150 305 195" stroke="#FBBF24" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M320 90 Q358 150 320 210" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Profile card 1 -->
  <rect x="310" y="60" width="70" height="55" rx="8" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="4"/>
  <circle cx="335" cy="80" r="10" fill="#93C5FD" stroke="#1E3A5F" stroke-width="2"/>
  <rect x="350" y="75" width="22" height="5" rx="2" fill="#CBD5E1"/>
  <rect x="350" y="85" width="18" height="5" rx="2" fill="#CBD5E1"/>
  <rect x="318" y="100" width="54" height="6" rx="2" fill="#F97316"/>

  <!-- Profile card 2 -->
  <rect x="320" y="170" width="70" height="55" rx="8" fill="#FFFFFF" stroke="#1E3A5F" stroke-width="4"/>
  <circle cx="345" cy="190" r="10" fill="#93C5FD" stroke="#1E3A5F" stroke-width="2"/>
  <rect x="360" y="185" width="22" height="5" rx="2" fill="#CBD5E1"/>
  <rect x="360" y="195" width="18" height="5" rx="2" fill="#CBD5E1"/>
  <rect x="328" y="210" width="54" height="6" rx="2" fill="#3B82F6"/>
</svg>
